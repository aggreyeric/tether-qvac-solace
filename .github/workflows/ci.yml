name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Build, Test & Health Check (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # package.json declares "engines": { "node": ">=22.17" }, so we test on
        # Node 22 only. 18/20 would violate the engine constraint.
        node: [22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Start server & health check (port 5274)
        run: |
          # `npm start` boots the mock dashboard server on :5274.
          # The server has no /health route, so we poll /api/telemetry
          # (the JSON status endpoint) for an HTTP 200.
          npm start &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:5274/api/telemetry; then
              echo "::notice::Server healthy after ${i}s (GET /api/telemetry -> 200)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server did not become healthy on :5274 within 30s"
          exit 1
